services:
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file:
      - ./worker/.env
    environment:
      - OMP_NUM_THREADS=4
      - MKL_NUM_THREADS=4
    networks:
      - worker_network
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
    healthcheck:
      test: ["CMD", "celery", "-A", "celery_app", "inspect", "ping", "--timeout", "5"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped
    volumes:
      - trade_signal:/app/signals
      - trade_model:/app/models

  celery_beat:
    build:
      context: .
      dockerfile: worker/Dockerfile
    command: celery -A celery_app beat --loglevel=${CELERY_LOG_LEVEL:-info}
    env_file:
      - ./worker/.env
    networks:
      - worker_network
    depends_on:
      worker:
        condition: service_healthy
    restart: unless-stopped

  flower:
    build:
      context: .
      dockerfile: worker/Dockerfile
    command: celery -A celery_app flower --port=5555 --loglevel=${CELERY_LOG_LEVEL:-info}
    ports:
      - "5555:5555"
    env_file:
      - ./worker/.env
    networks:
      - worker_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      worker:
        condition: service_healthy
    restart: unless-stopped
volumes:
  trade_signal:
  trade_model:

networks:
  worker_network:
    external: true
